server {
  listen 80;
  server_name localhost;

  add_header Content-Security-Policy "default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';";

  root /usr/share/nginx/html;
  index index.html;

  location / {

    try_files $uri $uri/ /index.html;
  }
}
