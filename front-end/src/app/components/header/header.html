<div class="sticky top-0 z-30">
<header class="header px-24 bg-[rgba(255,255,255,0.4)]">
    <div class="m-screen header-content mx-2">
      <div class="logo cursor-pointer" [routerLink]="['/']">
        <span class="material-symbols-outlined icon-logo">account_balance</span>
        <span class="logo-text">TADS BANK</span>
      </div>

      <div class="auth-buttons flex gap-2">
        <button [routerLink]="['/login']" class="h-fit min-w-32">Login</button>
        <button [routerLink]="['/autocadastro']" class="h-fit min-w-32">Abra sua Conta</button>
      </div>
    </div>
  </header>
  @if(isGerente) {
    <div class="w-screen bg-primary mb-4 text-white flex justify-center py-2 gap-x-2">
        <span class="material-symbols-outlined">monitoring</span>
        <p class="my-auto">ÁREA DO GERENTE - VICTOR HUGO BETONI</p>
    </div>
  }
</div>
