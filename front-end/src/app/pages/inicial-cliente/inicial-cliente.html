<modal-depositar-sacar [control]="modalSacarControl" tipo="withdraw" (close)="modalSacarControl = false" />
<modal-depositar-sacar [control]="modalDepositarControl" tipo="deposit" (close)="modalDepositarControl = false"/>
<modal-transferir [control]="modalTransferirControl" (close)="modalTransferirControl = false"/>

<div class="h-main-screen flex gap-x-16">
  <div class="h-full items-center flex flex-col justify-center w-2/3">
    <div class="w-full -mt-16 items-center flex flex-col justify-center">
      <h1 class="text-lg font-light ml-1 mb-2">Olá, {{ currentAccount.name.split(' ')[0]}}</h1>
      <h1 class="text-8xl" [class.text-red-500]="currentAccount.balance < 0">
        {{ currentAccount.balance | currency: 'BRL' }}
      </h1>
      <div class="grid grid-cols-4 gap-2 w-2/3 mt-2">
        <button class="h-14 text-lg! items-center gap-x-1 flex justify-center" (click)="modalSacarControl = true">
          <span class="material-symbols-outlined">arrow_upward</span>
          Sacar
        </button>
        <button class="h-14 text-lg! items-center gap-x-1 flex justify-center" (click)="modalDepositarControl = true">
          <span class="material-symbols-outlined">arrow_downward</span>
          Depositar
        </button>
        <button class="h-14 text-lg! items-center gap-x-1 flex justify-center" (click)="modalTransferirControl = true">
          <span class="material-symbols-outlined">compare_arrows</span>
          Transferir
        </button>
        <button class="h-14 text-lg! items-center gap-x-1 flex justify-center" >
          <span class="material-symbols-outlined">edit</span>
          Alterar perfil
        </button>
      </div>
    </div>
  </div>
  <div class="w-1/3 py-6">
    <extrato />
  </div>
</div>
