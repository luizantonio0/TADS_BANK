<main class="w-screen h-main-screen items-center flex justify-center">

  <div class="w-112 rounded-md bg-white border border-gray-200 shadow-md p-6 h-fit">
    <h1 class="text-left text-3xl font-extrabold text-primary">Bem vindo de volta!</h1>
    <p class="text-left mb-4 text-xs text-gray-400">Faça login para continuar.</p>

    <form [formGroup]="formLogin" (ngSubmit)="submit()">
      <div class="grid gap-x-2 gap-y-2 grid-cols-12">
        <div class="col-span-12">
          <label for="email">E-mail <span class="req-ast">*</span></label>
          <input formControlName="email" name="email" placeholder="Digite seu e-mail">
        </div>
        <div class="col-span-12">
          <label for="senha">Senha <span class="req-ast">*</span></label>
          <input formControlName="senha" name="senha" type="password" placeholder="Digite sua senha">
        </div>
      </div>
      <button class="mt-4 h-10 w-full" type="submit" [disabled]="formLogin.invalid">Entrar</button>
    </form>

  </div>

</main>
