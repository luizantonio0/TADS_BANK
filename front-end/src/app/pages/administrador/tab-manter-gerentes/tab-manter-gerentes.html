<app-modal-editar-gerente [control]="exibirModalEditar" (close)="exibirModalEditar = false" />
<app-modal-excluir-gerente [control]="exibirModalExcluir" (close)="exibirModalExcluir = false"/>
<app-modal-adicionar-gerente [control]="exibirModalAdicionar" (close)="exibirModalAdicionar = false"/>

<div class="p-4 bg-white border border-primary rounded-lg shadow-md">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-primary flex items-center gap-2">
      <span class="material-symbols-outlined">manage_accounts</span> Gerenciamento de Gerentes
    </h2>
    <button (click)="exibirModalAdicionar = true" class="bg-primary text-white px-4 py-2 rounded flex items-center gap-2 hover:bg-opacity-90">
      <span class="material-symbols-outlined">person_add</span> Novo Gerente
    </button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (item of gerentes; track item.gerente.cpf) {
      <div class="border p-4 rounded-lg flex justify-between items-start hover:shadow-sm">
        <div>
          <p class="font-bold text-lg">{{ item.gerente.nome }}</p>
          <p class="text-gray-600 text-sm">CPF: {{ item.gerente.cpf }}</p>
          <p class="text-gray-600 text-sm">E-mail: {{ item.gerente.email }}</p>
        </div>
        <div class="flex gap-2">
          <button (click)="exibirModalEditar = true" class="text-primary hover:bg-primary/10 p-1 rounded" title="Editar">
            <span class="material-symbols-outlined">edit</span>
          </button>
          <button (click)="exibirModalExcluir = true" class="text-red-600 hover:bg-red-50 p-1 rounded" title="Excluir">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>
      </div>
    } @empty {
      <div class="col-span-full text-center py-8 text-gray-500">
        Nenhum gerente encontrado no sistema.
      </div>
    }
  </div>
</div>
