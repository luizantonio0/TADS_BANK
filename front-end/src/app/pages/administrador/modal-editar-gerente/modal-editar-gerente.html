<modal 
  [control]="control" 
  title="Editar Gerente" 
  icon="manage_accounts"
  submitText="Salvar Alterações"
  [submitCallback]="submit"
  (close)="onClose()">

  <div class="flex flex-col gap-4 min-w-[300px] md:min-w-[450px]">
    <div class="flex flex-col gap-1">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-gray-500 text-[20px]">person</span>
        <label class="text-sm font-semibold text-gray-700">Nome Completo</label>
      </div>
      <input type="text" class="w-full border border-gray-300 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Digite o nome do gerente" value="Geniéve">
    </div>

    <div class="flex flex-col gap-1">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-gray-500 text-[20px]">mail</span>
        <label class="text-sm font-semibold text-gray-700">E-mail</label>
      </div>
      <input type="email" class="w-full border border-gray-300 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="gerente@bantads.com.br" value="ger1@bantads.com.br">
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-gray-500 text-[20px]">badge</span>
          <label class="text-sm font-semibold text-gray-700">CPF (Somente leitura)</label>
        </div>
        <input type="text" class="w-full border border-gray-200 rounded-md py-3 px-4 bg-gray-50 text-gray-500 cursor-not-allowed" value="985.743.070-84" readonly>
      </div>

      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-gray-500 text-[20px]">call</span>
          <label class="text-sm font-semibold text-gray-700">Telefone</label>
        </div>
        <input type="text" class="w-full border border-gray-300 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="(00) 00000-0000">
      </div>
    </div>

    <div class="flex flex-col gap-1">
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-gray-500 text-[20px]">lock</span>
        <label class="text-sm font-semibold text-gray-700">Nova Senha</label>
      </div>
      <input type="password" class="w-full border border-gray-300 rounded-md py-3 px-4 focus:outline-none focus:ring-2 focus:ring-primary/50" placeholder="Deixe em branco para manter a atual">
    </div>
  </div>
</modal>
