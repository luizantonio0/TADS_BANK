<main class="min-h-screen flex items-center justify-center">
  <div class="flex flex-col w-full max-w-md rounded-md bg-white border border-gray-200 shadow-md p-6 max-md:p-2 h-fit">
    <h1 class="text-center text-3xl font-extrabold text-primary">Bem vindo!</h1>
    <p class="text-center mb-4 text-xs text-gray-400">Ficamos felizes em ter você aqui.</p>
    <p class="mb-4 text-sm text-center text-gray-500">Para começar, realize seu cadastro:</p>
    <form [formGroup]="formCadastro" (ngSubmit)="submit()">
      <div class="grid gap-x-2 gap-y-2 grid-cols-12">
        <div class="col-span-12">
          <label for="nome">Nome</label>
          <input formControlName="nome" name="nome" placeholder="Digite seu nome">
        </div>
        <div class="col-span-7">
          <label for="cpf">CPF</label>
          <input formControlName="cpf" mask="000.000.000-00" [dropSpecialCharacters]="true" name="cpf" placeholder="Digite seu CPF">
        </div>
        <div class="col-span-5">
          <label for="salario">Salário</label>
          <input formControlName="salario" mask="separator.2" prefix="R$ " thousandSeparator="." decimalMarker="," [dropSpecialCharacters]="true" name="salario" placeholder="Digite seu salário">
        </div>
        <div class="col-span-6">
          <label for="email">E-mail</label>
          <input formControlName="email" name="email" placeholder="Digite seu e-mail">
        </div>
        <div class="col-span-6">
          <label for="telefone">Telefone</label>
          <input formControlName="telefone" mask="(00) 00000-0000" [dropSpecialCharacters]="true" name="telefone" placeholder="Digite seu telefone">
        </div>
      </div>
      <div class="grid gap-x-2 gap-y-2 grid-cols-12 mt-8">
        <div class="col-span-6">
          <label for="cep">CEP</label>
          <input formControlName="cep" mask="000000-000" [dropSpecialCharacters]="true" name="cep" placeholder="Digite seu CEP">
        </div>
        <div class="col-span-6 flex flex-col justify-end w-fit items-center">
          <span class="material-symbols-outlined text-primary h-8 border-gray-200 border p-1 rounded-md cursor-pointer bg-gray-100">search</span>
        </div>
        <div class="col-span-8">
          <label for="endereco">Endereço</label>
          <input formControlName="endereco" name="endereco" placeholder="Digite seu endereço" readonly>
        </div>
        <div class="col-span-4">
          <label for="numero">Número</label>
          <input name="numero" placeholder="Digite o número" disabled>
        </div>
        <div class="col-span-4">
          <label for="estado">Estado</label>
          <input formControlName="estado" name="estado" placeholder="Escolha seu estado" readonly>
        </div>
        <div class="col-span-8">
          <label for="cidade">Cidade</label>
          <input formControlName="cidade" name="numero" placeholder="Escolha sua cidade" readonly>
        </div>
      </div>
      <button class="mt-4 h-10 w-full" [disabled]="formCadastro.invalid" type="submit">Solicitar cadastro</button>
    </form>
  </div>
</main>
