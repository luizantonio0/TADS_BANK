<modal [icon]="tipo == 'deposit' ? 'arrow_downward' : 'arrow_upward'" [title]="tipo == 'deposit' ? 'Depositar' : 'Sacar'" [control]="control" (close)="onClose()" [submitDisabled]="form.invalid" [submitCallback]="submit">
    <div class="w-64">
        <form [formGroup]="form" (ngSubmit)="submit()">
            <label for="amount">Informe o valor</label>
            <input type="text" mask="separator.2" prefix="R$ " thousandSeparator="." decimalMarker=","
                formControlName="amount" id="amount" [dropSpecialCharacters]="true" placeholder="Digite um valor">
        </form>
    </div>
</modal>
