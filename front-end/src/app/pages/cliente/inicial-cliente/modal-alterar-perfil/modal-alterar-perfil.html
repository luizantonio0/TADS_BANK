<modal icon="person_edit" title="Informações pessoais" [control]="control" (close)="onClose()"
    [submitDisabled]="form.invalid" [submitCallback]="() => this.submit()" submitText="Salvar alterações">
    <div class="w-[250px]">
        <form [formGroup]="form" (ngSubmit)="submit()">
            <div class="grid gap-x-2 gap-y-2 grid-cols-12">
                <div class="col-span-12">
                    <label for="nome">Nome<span class="req-ast">*</span></label>
                    <input formControlName="nome" name="nome" placeholder="Digite seu nome">
                </div>
                <div class="col-span-3">
                    <label for="salario">Salário<span class="req-ast">*</span></label>
                    <input formControlName="salario" mask="separator.2" prefix="R$ " thousandSeparator="."
                        decimalMarker="," [dropSpecialCharacters]="true" name="salario"
                        placeholder="Digite seu salário">
                </div>
                <div class="col-span-6">
                    <label for="email">E-mail<span class="req-ast">*</span></label>
                    <input formControlName="email" name="email" placeholder="Digite seu e-mail">
                </div>
                <div class="col-span-3">
                    <label for="telefone">Telefone<span class="req-ast">*</span></label>
                    <input formControlName="telefone" mask="(00) 00000-0000" [dropSpecialCharacters]="true"
                        name="telefone" placeholder="Digite seu telefone">
                </div>
            </div>
            <div class="grid gap-x-2 gap-y-2 grid-cols-12 mt-8">
                <div class="col-span-2">
                    <label for="cep">CEP<span class="req-ast">*</span></label>
                    <input formControlName="cep" mask="000000-000" [dropSpecialCharacters]="true" name="cep"
                        placeholder="Digite seu CEP">
                </div>
                <div class="col-span-10 flex flex-col justify-end w-fit items-center">
                    <span
                        class="material-symbols-outlined text-primary h-8 border-gray-200 border p-1 rounded-md cursor-pointer bg-gray-100">search</span>
                </div>
                <div class="col-span-8">
                    <label for="endereco">Endereço<span class="req-ast">*</span></label>
                    <input formControlName="endereco" name="endereco" placeholder="Digite seu endereço" readonly>
                </div>
                <div class="col-span-4">
                    <label for="numero">Número<span class="req-ast">*</span></label>
                    <input name="numero" placeholder="Digite o número" disabled>
                </div>
                <div class="col-span-4">
                    <label for="estado">Estado<span class="req-ast">*</span></label>
                    <input formControlName="estado" name="estado" placeholder="Escolha seu estado" readonly>
                </div>
                <div class="col-span-8">
                    <label for="cidade">Cidade<span class="req-ast">*</span></label>
                    <input formControlName="cidade" name="numero" placeholder="Escolha sua cidade" readonly>
                </div>
            </div>
        </form>
    </div>
</modal>
