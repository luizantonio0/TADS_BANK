<modal [title]="tipo == 'deposit' ? 'Depositar' : 'Sacar'" [control]="control" (close)="onClose()" [submitDisabled]="form.invalid" [submitCallback]="() => this.submit()">
    <div class="w-64">
        <form [formGroup]="form">
            <label for="amount">Informe o valor</label>
            <input type="text" mask="separator.2" prefix="R$ " thousandSeparator="." decimalMarker=","
                formControlName="amount" name="amount" [dropSpecialCharacters]="true" placeholder="Digite um valor">
        </form>
    </div>
</modal>
