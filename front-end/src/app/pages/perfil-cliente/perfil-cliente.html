<div class="h-main-screen flex gap-x-16">
  <div class="h-full items-center flex flex-col w-2/3 py-6">
    <div style="backdrop-filter: blur(4px);" class="w-full bg-[rgba(255,255,255,0.4)] h-full shadow-md rounded-md p-8 flex flex-col overflow-y-auto">
      
      <div class="flex items-center gap-2 mb-6 text-primary">
        <span class="material-symbols-outlined text-2xl">person_edit</span>
        <h2 class="text-lg font-light">Informações Pessoais</h2>
      </div>

      <form class="space-y-4 w-full flex-grow flex flex-col">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-light text-slate-700 mb-1">Nome Completo</label>
            <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="João da Silva"/>
          </div>
          <div>
            <label class="block text-sm font-light text-slate-700 mb-1">CPF (Inalterável)</label>
            <input class="w-full rounded-md bg-slate-100/50 border-slate-200 text-slate-500 cursor-not-allowed py-2 px-3" disabled type="text" value="123.456.789-00"/>
          </div>
          <div>
            <label class="block text-sm font-light text-slate-700 mb-1">E-mail</label>
            <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="email" value="joao.silva@email.com"/>
          </div>
          <div>
            <label class="block text-sm font-light text-slate-700 mb-1">Telefone</label>
            <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="(11) 98765-4321"/>
          </div>
          <div>
            <label class="block text-sm font-light text-slate-700 mb-1">CEP</label>
            <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="01234-567"/>
          </div>
        </div>

        <div class="pt-4 mt-4 border-t border-slate-200/60">
          <h3 class="text-sm font-light text-slate-500 mb-4">Endereço</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-2">
              <label class="block text-sm font-light text-slate-700 mb-1">Rua/Logradouro</label>
              <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="Avenida Paulista"/>
            </div>
            <div>
              <label class="block text-sm font-light text-slate-700 mb-1">Número</label>
              <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="1000"/>
            </div>
            <div>
              <label class="block text-sm font-light text-slate-700 mb-1">Complemento</label>
              <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="Apto 42"/>
            </div>
            <div>
              <label class="block text-sm font-light text-slate-700 mb-1">Cidade</label>
              <input class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3" type="text" value="São Paulo"/>
            </div>
            <div>
              <label class="block text-sm font-light text-slate-700 mb-1">Estado</label>
              <select class="w-full rounded-md border-slate-200 bg-white/70 focus:ring-primary focus:border-primary py-2 px-3">
                <option selected value="SP">São Paulo</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="PR">Paraná</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mt-auto pt-6 flex justify-end">
          <button class="h-12 text-md px-6 bg-primary text-white items-center gap-x-1 flex justify-center rounded-md hover:bg-opacity-90 transition-all" type="button">
            <span class="material-symbols-outlined text-base">save</span>
            Salvar Alterações
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="w-1/3 py-6 flex flex-col gap-y-4">
    
    <div class="bg-primary w-full rounded-md p-6 shadow-md flex flex-col text-white">
      <div class="flex items-center gap-2 mb-4 text-white/90">
        <span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
        <h2 class="text-sm font-light uppercase tracking-wider">Dados da Conta</h2>
      </div>
      <div class="space-y-4">
        <div>
          <p class="text-[10px] font-light uppercase tracking-widest text-blue-200 mb-1">Saldo Disponível</p>
          <p class="text-3xl font-normal">R$ 4.250,00</p>
        </div>
        <div class="bg-white/10 p-4 rounded-md border border-white/10">
          <div class="flex justify-between items-end mb-2">
            <span class="text-xs font-light text-blue-100">Limite de Conta</span>
            <span class="text-sm font-normal">R$ 2.500,00</span>
          </div>
          <div class="w-full bg-white/20 h-1.5 rounded-full overflow-hidden">
            <div class="bg-white h-full w-[60%]"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white w-full rounded-md p-6 shadow-md flex flex-col">
      <div class="flex items-center gap-2 mb-4 text-primary">
        <span class="material-symbols-outlined text-2xl">security</span>
        <h2 class="text-lg font-light">Segurança</h2>
      </div>
      
      <div class="space-y-2">
        <button class="w-full h-12 text-md items-center px-4 flex justify-between bg-slate-50 hover:bg-slate-100 rounded-md border border-slate-100 transition-colors">
          <span class="font-light">Alterar Senha</span>
          <span class="material-symbols-outlined text-slate-400">chevron_right</span>
        </button>
        <button class="w-full h-12 text-md items-center px-4 flex justify-between bg-slate-50 hover:bg-slate-100 rounded-md border border-slate-100 transition-colors">
          <span class="font-light">Configurar 2FA</span>
          <span class="material-symbols-outlined text-slate-400">chevron_right</span>
        </button>
      </div>
    </div>

    <div class="bg-white w-full rounded-md p-6 shadow-md flex flex-col mt-auto">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-md bg-slate-100 flex items-center justify-center text-primary">
          <span class="material-symbols-outlined text-2xl">support_agent</span>
        </div>
        <div>
          <p class="text-xs font-light text-slate-500 uppercase">Gerente de Conta</p>
          <p class="text-lg font-normal text-slate-800">Joãozinho</p>
        </div>
      </div>
    </div>
  </div>
</div>
