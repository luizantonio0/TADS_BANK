<p class="text-2xl font-bold text-primary mb-4">Suas solicitações em aberto:</p>
<div>
    <data-grid [columns]="colunas" [supplier]="supplier">
        <ng-template #desktopRow let-item>
            <td>{{ item.cpf | cpf }}</td>
            <td>{{ item.nome }}</td>
            <td>{{ item.salario | currency: 'BRL' }}</td>
            <td class="flex gap-x-2 [&>button]:text-xs! [&>button]:h-auto! ">
                <button class="my-auto items-center flex justify-center gap-x-0.5">
                    <span class="material-symbols-outlined text-sm!">check</span>
                    Aprovar
                </button>
                <button class="bg-red-500! my-auto items-center flex justify-center gap-x-0.5">
                    <span class="material-symbols-outlined text-sm!">close</span>
                    Reprovar
                </button>
            </td>
        </ng-template>
    </data-grid>
</div>
