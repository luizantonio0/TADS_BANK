<div class="h-main-screen">
    <div class="flex gap-x-4">
        <div class="flex flex-col gap-y-2">
            <button class="h-16 w-48 flex items-center justify-center gap-x-2 text-lg font-medium transition-colors"
                (click)="selectedTab = 1"
                [ngClass]="selectedTab == 1 ? 'bg-primary! text-white!' : 'bg-white! text-primary! border border-primary'">
                <span class="material-symbols-outlined">unknown_document</span>
                <span>Solicitações Abertas</span>
            </button>

            <button class="h-16 w-48 flex items-center justify-center gap-x-2 text-lg font-medium transition-colors"
                (click)="selectedTab = 2"
                [ngClass]="selectedTab == 2 ? 'bg-primary! text-white!' : 'bg-white! text-primary! border border-primary'">
                <span class="material-symbols-outlined">
                    group
                </span>
                <span>Visualizar Clientes</span>
            </button>

            <button class="h-16 w-48 flex items-center justify-center gap-x-2 text-lg font-medium transition-colors"
                (click)="selectedTab = 3"
                [ngClass]="selectedTab == 3 ? 'bg-primary! text-white!' : 'bg-white! text-primary! border border-primary'">
                <span class="material-symbols-outlined">kid_star</span>
                <span>Melhores Clientes</span>
            </button>

            <button class="h-16 w-48 flex items-center justify-center gap-x-2 text-lg font-medium transition-colors"
                (click)="selectedTab = 4"
                [ngClass]="selectedTab == 4 ? 'bg-primary! text-white!' : 'bg-white! text-primary! border border-primary'">
                <span class="material-symbols-outlined">search</span>
                <span>Consultar Cliente</span>
            </button>
        </div>
        <div class="flex-1">
            @if(selectedTab == 1) {
                <tab-solicitacoes></tab-solicitacoes>
            }
            @if(selectedTab == 2) {
                <tab-clientes></tab-clientes>
            }
            @if(selectedTab == 3) {
                <tab-melhores-clientes></tab-melhores-clientes>
            }
        </div>
    </div>
</div>
