<div
  [class.bg-cliente]="isClienteInicial"
  [class.bg-login]="isLogin || isAutocadastro "
  class="bg-cover">

  @if (isAdmin) {
    <app-header-administrador></app-header-administrador>
  } @else if (isClienteInicial) {
    <app-header-cliente></app-header-cliente>
  } @else {
    <app-header [isGerente]="isGerente"></app-header>
  }
  <div [class.md:px-24]="!isHome" class="px-12">
    <router-outlet />
  </div>
</div>
<toast-container/>
